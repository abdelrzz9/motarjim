name: VS Code Extension

on:
  push:
    branches: [main]
    paths:
      - 'apps/vscode-extension/**'
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build Extension
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/vscode-extension
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: apps/vscode-extension/package-lock.json
      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi
      - name: Compile
        run: npm run compile
      - name: Package
        run: npx vsce package --out motarjim-vscode.vsix
        continue-on-error: true
      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: motarjim-vscode
          path: apps/vscode-extension/motarjim-vscode.vsix
        if: success()
