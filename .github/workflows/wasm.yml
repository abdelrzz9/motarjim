name: WASM

on:
  push:
    branches: [main]
    paths:
      - 'crates/motarjim-wasm/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build WASM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Install wasm-pack
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack
      - name: Build WASM
        run: wasm-pack build crates/motarjim-wasm --target web --out-dir pkg
      - name: Check size
        run: ls -lh crates/motarjim-wasm/pkg/
