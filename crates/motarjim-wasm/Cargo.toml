[package]
name = "motarjim-wasm"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "WASM bindings for Motarjim compiler"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
motarjim-core = { workspace = true, features = ["wasm"] }
motarjim-diag = { workspace = true }
motarjim-config = { workspace = true }
motarjim-fs = { workspace = true }
motarjim-span = { workspace = true }
wasm-bindgen = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
js-sys = { workspace = true }
getrandom_02 = { package = "getrandom", version = "0.2", features = ["js"] }
getrandom_03 = { package = "getrandom", version = "0.3", features = ["wasm_js"] }

[features]
default = []

[lints]
workspace = true
